name: Deploy to GitHub Pages

# Builds the Next.js static export and publishes it to GitHub Pages.
#
# Triggers:
#   - push to master         → deploy on every code change
#   - workflow_dispatch      → manual "Run workflow" button
#   - repository_dispatch    → fired by the Sanity webhook (event type
#     "sanity-publish") so publishing content rebuilds the site. See README.

on:
  push:
    branches: [master]
  workflow_dispatch:
  repository_dispatch:
    types: [sanity-publish]

# Permissions the deploy job needs to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-flight run finish (don't cancel a
# deploy mid-publish).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build static export
        run: npm run build
        env:
          # Public (browser-safe) Sanity config — set as repo Variables.
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ vars.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ vars.NEXT_PUBLIC_SANITY_DATASET }}
          NEXT_PUBLIC_SANITY_API_VERSION: ${{ vars.NEXT_PUBLIC_SANITY_API_VERSION }}
          NEXT_PUBLIC_HUBSPOT_PORTAL_ID: ${{ vars.NEXT_PUBLIC_HUBSPOT_PORTAL_ID }}
          # Server-only viewer token used at BUILD time to read content.
          # Stays in CI — never shipped to the browser. Set as a repo Secret.
          SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}

      # Build the client-side search index over the exported HTML (writes
      # out/pagefind/). Powers the Help Center search; no server needed.
      - run: npx pagefind --site out

      # Stop GitHub Pages' Jekyll from stripping the _next/ asset directory.
      - run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
